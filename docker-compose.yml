# ============================================
# Payment System - Docker Compose (Terpusat)
# ============================================
# Menjalankan semua infrastructure + semua service
#
# Struktur folder yang diharapkan:
#   payment-system-infra/
#   ├── docker-compose.yml        ← file ini
#   ├── init-databases.sh
#   ├── .env                      ← (optional) override variables
#   └── ../order-service/         ← repo Order Service
#   └── ../payment-service/       ← repo Payment Service
#   └── ../notification-service/  ← repo Notification Service
#
# Quick start:
#   docker compose up -d
#
# Hanya infrastructure (untuk development tanpa Docker service):
#   docker compose up -d postgres kafka kafka-ui
#
# Rebuild setelah code berubah:
#   docker compose up -d --build order-service payment-service notification-service
#
# Lihat logs:
#   docker compose logs -f order-service
#   docker compose logs -f payment-service
#   docker compose logs -f notification-service
#
# Shutdown + hapus volume:
#   docker compose down -v
# ============================================

services:

  # ==========================================
  # INFRASTRUCTURE
  # ==========================================

  # --- PostgreSQL (3 databases dalam 1 container) ---
  postgres:
    image: postgres:16-alpine
    container_name: payment-system-postgres
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  # --- Zookeeper ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: payment-system-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  # --- Kafka ---
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: payment-system-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - payment-network

  # --- Kafka UI (monitoring) ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: payment-system-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: payment-system-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "9090:8080"
    networks:
      - payment-network

  # ==========================================
  # APPLICATION SERVICES
  # ==========================================

  # --- Payment Service (harus start duluan, Order Service depends on ini) ---
  payment-service:
    build:
      context: ../payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: dev
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Kafka (internal network, bukan localhost)
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Server port
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - payment-network

  # --- Order Service ---
  order-service:
    build:
      context: ../order-service
      dockerfile: Dockerfile
    container_name: order-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: dev
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Kafka (internal network)
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Payment Service URL (via Docker internal network, bukan localhost)
      PAYMENT_SERVICE_BASE_URL: http://payment-service:8081/api/v1
      # Server port
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - payment-network

  # --- Notification Service ---
  notification-service:
    build:
      context: ../notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: dev
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Kafka (internal network)
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Server port
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - payment-network

# ==========================================
# VOLUMES & NETWORKS
# ==========================================
volumes:
  postgres_data:
    driver: local

networks:
  payment-network:
    driver: bridge
